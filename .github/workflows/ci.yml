name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r src/api/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/api/ --max-line-length=100

      - name: Run tests
        run: |
          pip install pytest httpx
          pytest src/tests/ -v



